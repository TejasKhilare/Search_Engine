services:

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: fastapi_app
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app
    depends_on:
      qdrant:
        condition: service_started
    dns:
      - 8.8.8.8
      - 8.8.4.4
    env_file:
      - ../backend/.env
    restart: always

  qdrant:
    image: qdrant/qdrant
    container_name: qdrant_db
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data: